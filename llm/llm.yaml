apiVersion: v1
kind: Service
metadata:
  name: llm-api
  labels:
    app: llm-api
spec:
  ports:
    - port: 8000
      name: http
  selector:
    app: llm-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-api
  labels:
    app: llm-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-api
  template:
    metadata:
      labels:
        app: llm-api
    spec:
      initContainers:
        - name: wait-mcp
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z llm-trino-mcp 8765; do sleep 2; done
      containers:
        - name: llm-api
          image: local/llm-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: HF_TOKEN
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 20
      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: llm-langgraph-api
  labels:
    app: llm-langgraph-api
spec:
  ports:
    - port: 8000
      name: http
  selector:
    app: llm-langgraph-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-langgraph-api
  labels:
    app: llm-langgraph-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-langgraph-api
  template:
    metadata:
      labels:
        app: llm-langgraph-api
    spec:
      containers:
        - name: llm-langgraph-api
          image: local/llm-langgraph-api:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "server_langgraph.py"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: HF_TOKEN
            - name: LANGSMITH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: LANGSMITH_API_KEY
            - name: LANGSMITH_PROJECT
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: LANGSMITH_PROJECT
            - name: LANGSMITH_TRACING
              value: "true"
            - name: LANGCHAIN_TRACING_V2
              value: "true"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /health/langgraph
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 20
      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 20Gi
