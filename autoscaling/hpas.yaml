# HorizontalPodAutoscalers — require metrics-server (make cluster-up installs it).
# Tune maxReplicas via platform-config AUTOSCALE_MAX_REPLICAS if needed.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credit-api
  labels:
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credit-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
