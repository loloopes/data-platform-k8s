apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-langgraph-api
spec:
  template:
    spec:
      containers:
        - name: llm-langgraph-api
          env:
            - name: LLM_DEVICE
              value: cpu
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 8Gi
