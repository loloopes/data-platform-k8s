apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  labels:
    app: kafka-init
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka 9092; do
                echo waiting for kafka...
                sleep 3
              done
      containers:
        - name: kafka-topics
          image: confluentinc/cp-kafka:7.8.3
          envFrom:
            - configMapRef:
                name: platform-config
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              topic="${KAFKA_CONSUMER_TOPIC:-predict}"
              partitions="${KAFKA_TOPIC_PARTITIONS:-3}"
              replication="${KAFKA_TOPIC_REPLICATION_FACTOR:-1}"
              echo "Ensuring Kafka topic ${topic} (partitions=${partitions}, replication=${replication})"
              kafka-topics --bootstrap-server kafka:9092 \
                --create --if-not-exists \
                --topic "${topic}" \
                --partitions "${partitions}" \
                --replication-factor "${replication}"
              kafka-topics --bootstrap-server kafka:9092 --describe --topic "${topic}"
              echo "Kafka topic ${topic} ready"
