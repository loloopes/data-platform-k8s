apiVersion: v1
kind: Service
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  ports:
    - port: 5000
      name: http
  selector:
    app: mlflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do sleep 2; done
              until wget -q -O- http://minio:9000/minio/health/ready; do sleep 2; done
      containers:
        - name: mlflow
          image: local/mlflow:latest
          imagePullPolicy: IfNotPresent
          workingDir: /mlflow_data
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MLFLOW_TRACKING_USERNAME
            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MLFLOW_TRACKING_PASSWORD
          command:
            - bash
            - -c
            - |
              mlflow db upgrade "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
              exec mlflow server \
                --app-name basic-auth \
                --host 0.0.0.0 \
                --port 5000 \
                --allowed-hosts "${MLFLOW_SERVER_ALLOWED_HOSTS}" \
                --backend-store-uri "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}" \
                --default-artifact-root "s3://${MLFLOW_BUCKET}"
          volumeMounts:
            - name: auth-data
              mountPath: /mlflow_data
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: auth-data
          emptyDir: {}
