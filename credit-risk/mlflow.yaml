apiVersion: v1
kind: Service
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  ports:
    - port: 5000
      name: http
  selector:
    app: mlflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mlflow-postgres 5432; do sleep 2; done
              until wget -q -O- http://minio:9000/minio/health/ready; do sleep 2; done
      containers:
        - name: mlflow
          image: local/mlflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          env:
            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MLFLOW_TRACKING_USERNAME
            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MLFLOW_TRACKING_PASSWORD
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              PG_HOST="mlflow-postgres"
              BACKEND="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PG_HOST}:5432/${POSTGRES_DB}"
              AUTH_URI="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PG_HOST}:5432/${MLFLOW_AUTH_DB}"

              export AUTH_URI
              python - <<'PY'
              import os

              with open("/tmp/basic_auth.ini", "w", encoding="utf-8") as handle:
                  handle.write("[mlflow]\n")
                  handle.write("default_permission = READ\n")
                  handle.write(f"database_uri = {os.environ['AUTH_URI']}\n")
                  handle.write(f"admin_username = {os.environ['MLFLOW_TRACKING_USERNAME']}\n")
                  handle.write(f"admin_password = {os.environ['MLFLOW_TRACKING_PASSWORD']}\n")
              PY
              export MLFLOW_AUTH_CONFIG_PATH=/tmp/basic_auth.ini

              python -m mlflow.server.auth db upgrade --url "$AUTH_URI"

              exec mlflow server \
                --app-name basic-auth \
                --host 0.0.0.0 \
                --port 5000 \
                --workers 1 \
                --allowed-hosts "${MLFLOW_SERVER_ALLOWED_HOSTS}" \
                --backend-store-uri "$BACKEND" \
                --default-artifact-root "s3://${MLFLOW_BUCKET}"
          startupProbe:
            tcpSocket:
              port: 5000
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: 5000
            periodSeconds: 10
            failureThreshold: 3
