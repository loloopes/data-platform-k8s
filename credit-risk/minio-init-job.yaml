apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  labels:
    app: minio-init
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://minio:9000/minio/health/ready; do
                echo waiting for minio...
                sleep 3
              done
      containers:
        - name: mc
          image: minio/mc
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MLFLOW_BUCKET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MLFLOW_BUCKET
            - name: HIVE_WAREHOUSE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: HIVE_WAREHOUSE_BUCKET
          command:
            - /bin/sh
            - -c
            - |
              mc alias set myminio http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing "myminio/${MLFLOW_BUCKET}"
              mc policy set public "myminio/${MLFLOW_BUCKET}" || true
              mc mb --ignore-existing "myminio/${HIVE_WAREHOUSE_BUCKET}"
              echo buckets ready
