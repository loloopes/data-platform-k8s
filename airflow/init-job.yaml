apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  labels:
    app: airflow-init
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: airflow-init
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z airflow-redis 6379; do sleep 2; done
              until nc -z airflow-postgres 5432; do sleep 2; done
      containers:
        - name: airflow-init
          image: local/airflow:3.1.0-libgomp
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: platform-secrets
          env:
            - name: _AIRFLOW_DB_MIGRATE
              value: "true"
            - name: _AIRFLOW_WWW_USER_CREATE
              value: "true"
            - name: _PIP_ADDITIONAL_REQUIREMENTS
              value: ""
            - name: AIRFLOW_WWW_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_WWW_USER_USERNAME
            - name: AIRFLOW_WWW_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_WWW_USER_PASSWORD
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_FERNET_KEY
          command:
            - /bin/bash
            - -c
            - |
              mkdir -p /opt/airflow/logs
              /entrypoint airflow db migrate
              /entrypoint airflow users create \
                --role Admin \
                --username "${AIRFLOW_WWW_USER_USERNAME}" \
                --password "${AIRFLOW_WWW_USER_PASSWORD}" \
                --firstname Airflow \
                --lastname Admin \
                --email admin@example.com || true
