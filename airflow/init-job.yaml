apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  labels:
    app: airflow-init
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: airflow-init
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      initContainers:
        - name: wait-deps
          image: postgres:15
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_DB_PASSWORD
          envFrom:
            - secretRef:
                name: platform-secrets
          command:
            - bash
            - -c
            - |
              until pg_isready -h airflow-postgres -U "$AIRFLOW_DB_USER" -d "$AIRFLOW_DB_NAME"; do sleep 2; done
              until nc -z airflow-redis 6379; do sleep 2; done
      containers:
        - name: airflow-init
          image: local/airflow:3.1.0-libgomp
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: platform-secrets
          env:
            - name: _AIRFLOW_DB_MIGRATE
              value: "true"
            - name: _AIRFLOW_WWW_USER_CREATE
              value: "false"
            - name: _PIP_ADDITIONAL_REQUIREMENTS
              value: ""
            - name: _AIRFLOW_WWW_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_WWW_USER_USERNAME
            - name: _AIRFLOW_WWW_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_WWW_USER_PASSWORD
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_FERNET_KEY
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              mkdir -p /opt/airflow/logs
              until airflow db check 2>/dev/null; do
                echo "waiting for airflow metadata db..."
                sleep 3
              done
              airflow db migrate
              airflow users create \
                --role Admin \
                --username "${_AIRFLOW_WWW_USER_USERNAME}" \
                --password "${_AIRFLOW_WWW_USER_PASSWORD}" \
                --firstname Airflow \
                --lastname Admin \
                --email admin@example.com \
              || airflow users reset-password \
                --username "${_AIRFLOW_WWW_USER_USERNAME}" \
                --password "${_AIRFLOW_WWW_USER_PASSWORD}"
