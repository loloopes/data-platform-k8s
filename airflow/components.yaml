apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-worker
  labels:
    app: airflow-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-worker
  template:
    metadata:
      labels:
        app: airflow-worker
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z airflow-redis 6379; do sleep 2; done
              until nc -z airflow-postgres 5432; do sleep 2; done
              until nc -z airflow-apiserver 8080; do sleep 2; done
        - name: wait-db
          image: local/airflow:3.1.0-libgomp
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: platform-secrets
          command:
            - /bin/bash
            - -c
            - |
              until airflow db check 2>/dev/null; do sleep 5; done
      containers:
        - name: airflow-worker
          image: local/airflow:3.1.0-libgomp
          imagePullPolicy: IfNotPresent
          args: ["celery", "worker"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: platform-secrets
          env:
            - name: DUMB_INIT_SETSID
              value: "0"
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_FERNET_KEY
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
      volumes:
        - name: airflow-logs
          emptyDir: {}
---
