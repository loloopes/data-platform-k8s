apiVersion: v1
kind: Service
metadata:
  name: airflow-apiserver
  labels:
    app: airflow-apiserver
spec:
  ports:
    - port: 8080
      name: http
  selector:
    app: airflow-apiserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-apiserver
  labels:
    app: airflow-apiserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-apiserver
  template:
    metadata:
      labels:
        app: airflow-apiserver
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z airflow-redis 6379; do sleep 2; done
              until nc -z airflow-postgres 5432; do sleep 2; done
        - name: wait-db
          image: local/airflow:3.1.0-libgomp
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: platform-secrets
          command:
            - /bin/bash
            - -c
            - |
              until airflow db check 2>/dev/null; do
                echo waiting for airflow db migrate...
                sleep 5
              done
      containers:
        - name: airflow-apiserver
          image: local/airflow:3.1.0-libgomp
          imagePullPolicy: IfNotPresent
          args: ["api-server"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: platform-secrets
          env:
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: AIRFLOW_FERNET_KEY
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
          readinessProbe:
            httpGet:
              path: /api/v2/version
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
      volumes:
        - name: airflow-logs
          emptyDir: {}
---
