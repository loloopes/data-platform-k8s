apiVersion: v1
kind: Service
metadata:
  name: airflow-redis
  labels:
    app: airflow-redis
spec:
  ports:
    - port: 6379
      name: redis
  selector:
    app: airflow-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-redis
  labels:
    app: airflow-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-redis
  template:
    metadata:
      labels:
        app: airflow-redis
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: redis:7.2-bookworm
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
