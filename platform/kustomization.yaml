apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data-platform

resources:
  - ../base
  - ../credit-risk
  - ../trino
  - ../spark
  - ../mcp
  - ../llm
  - ../airflow
  - ../autoscaling
  - ../ingress

# NodePort patches for localhost access via kind extraPortMappings (see kind-config.yaml)
patches:
  - path: ../expose/patches/credit-api.yaml
    target:
      kind: Service
      name: credit-api
  - path: ../expose/patches/mlflow.yaml
    target:
      kind: Service
      name: mlflow
  - path: ../expose/patches/llm-api.yaml
    target:
      kind: Service
      name: llm-api
  - path: ../expose/patches/llm-langgraph-api.yaml
    target:
      kind: Service
      name: llm-langgraph-api
  - path: ../expose/patches/trino.yaml
    target:
      kind: Service
      name: trino
  - path: ../expose/patches/minio.yaml
    target:
      kind: Service
      name: minio
  - path: ../expose/patches/airflow-apiserver.yaml
    target:
      kind: Service
      name: airflow-apiserver
  - path: ../expose/patches/spark-master.yaml
    target:
      kind: Service
      name: spark-master
  # CPU/memory requests for HPA + Grafana (must live here to patch sibling components)
  - path: ../autoscaling/patches/credit-api.yaml
    target:
      kind: Deployment
      name: credit-api
  - path: ../autoscaling/patches/mlflow.yaml
    target:
      kind: Deployment
      name: mlflow
  - path: ../autoscaling/patches/llm-api.yaml
    target:
      kind: Deployment
      name: llm-api
  - path: ../autoscaling/patches/llm-langgraph-api.yaml
    target:
      kind: Deployment
      name: llm-langgraph-api
  - path: ../autoscaling/patches/llm-trino-mcp.yaml
    target:
      kind: Deployment
      name: llm-trino-mcp
  - path: ../autoscaling/patches/spark-worker.yaml
    target:
      kind: Deployment
      name: spark-worker
  - path: ../autoscaling/patches/airflow-worker.yaml
    target:
      kind: Deployment
      name: airflow-worker
  - path: ../autoscaling/patches/airflow-apiserver.yaml
    target:
      kind: Deployment
      name: airflow-apiserver
