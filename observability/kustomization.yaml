apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - namespace.yaml
  - kube-state-metrics.yaml
  - prometheus-rbac.yaml
  - prometheus-config.yaml
  - prometheus.yaml
  - alertmanager.yaml
  - grafana.yaml

configMapGenerator:
  - name: grafana-dashboards
    files:
      - dashboards/hpa-overview.json
      - dashboards/workload-resources.json
      - dashboards/alerts-overview.json

generatorOptions:
  disableNameSuffixHash: true
