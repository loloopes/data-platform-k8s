apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    rule_files:
      - /etc/prometheus/rules/platform-alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics:8080"]

      - job_name: alertmanager
        static_configs:
          - targets: ["alertmanager:9093"]

      - job_name: kubernetes-apiservers
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            action: keep
            regex: default;kubernetes;https

      - job_name: kubernetes-nodes-cadvisor
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - data-platform
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: replace
            target_label: container

  platform-alerts.yml: |
    groups:
      - name: data-platform-hpa
        rules:
          - alert: HPAAtMaxReplicas
            expr: |
              kube_horizontalpodautoscaler_status_current_replicas{namespace="data-platform"}
              == kube_horizontalpodautoscaler_spec_max_replicas{namespace="data-platform"}
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
              description: "HPA {{ $labels.horizontalpodautoscaler }} in {{ $labels.namespace }} has been at max replicas ({{ $value }}) for 10 minutes."

          - alert: HPAScalingStuck
            expr: |
              kube_horizontalpodautoscaler_status_desired_replicas{namespace="data-platform"}
              != kube_horizontalpodautoscaler_status_current_replicas{namespace="data-platform"}
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "HPA {{ $labels.horizontalpodautoscaler }} not reaching desired replicas"
              description: "Desired {{ $labels.horizontalpodautoscaler }} replicas differ from current for 15 minutes."

      - name: data-platform-workloads
        rules:
          - alert: PodCrashLooping
            expr: |
              increase(kube_pod_container_status_restarts_total{namespace="data-platform"}[15m]) > 2
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} container {{ $labels.container }} restarting"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} restarted more than twice in 15 minutes."

          - alert: PodNotReady
            expr: |
              kube_pod_status_ready{namespace="data-platform", condition="true"} == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} not ready"
              description: "Pod {{ $labels.pod }} has been not ready for 10 minutes."

          - alert: DeploymentReplicasMismatch
            expr: |
              kube_deployment_spec_replicas{namespace="data-platform"}
              != kube_deployment_status_replicas_available{namespace="data-platform"}
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.deployment }} replica mismatch"
              description: "Available replicas do not match spec for 15 minutes."

          - alert: PodHighCPU
            expr: |
              (
                sum by (namespace, pod, container) (
                  rate(container_cpu_usage_seconds_total{namespace="data-platform", container!="", image!=""}[5m])
                )
                /
                sum by (namespace, pod, container) (
                  kube_pod_container_resource_requests{namespace="data-platform", resource="cpu", container!=""}
                )
              ) > 0.9
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.pod }}/{{ $labels.container }}"
              description: "Container is above 90% of its CPU request for 10 minutes."

          - alert: PodHighMemory
            expr: |
              (
                sum by (namespace, pod, container) (
                  container_memory_working_set_bytes{namespace="data-platform", container!="", image!=""}
                )
                /
                sum by (namespace, pod, container) (
                  kube_pod_container_resource_requests{namespace="data-platform", resource="memory", container!=""}
                )
              ) > 0.9
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High memory on {{ $labels.pod }}/{{ $labels.container }}"
              description: "Container is above 90% of its memory request for 10 minutes."

      - name: monitoring-stack
        rules:
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Prometheus target {{ $labels.job }} down"
              description: "Target {{ $labels.instance }} of job {{ $labels.job }} has been down for 5 minutes."
